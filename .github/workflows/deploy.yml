name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Repository Actions secrets (Settings → Secrets and variables → Actions).
    # If you also define these names under the github-pages environment, those values override repo secrets.
    env:
      APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
      APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Actions secrets are set
        run: |
          missing=0
          if [ -z "${APPS_SCRIPT_URL}" ]; then
            echo "::error::APPS_SCRIPT_URL is empty. Add repository secret APPS_SCRIPT_URL (Settings → Secrets and variables → Actions), or set it on the github-pages environment."
            missing=1
          fi
          if [ -z "${APPS_SCRIPT_TOKEN}" ]; then
            echo "::error::APPS_SCRIPT_TOKEN is empty. Add repository secret APPS_SCRIPT_TOKEN (Settings → Secrets and variables → Actions), or set it on the github-pages environment."
            missing=1
          fi
          exit "$missing"

      - name: Generate atlas-env.js
        run: |
          python3 << 'PY'
          import json, os, sys

          required = ["APPS_SCRIPT_URL", "APPS_SCRIPT_TOKEN"]
          cfg = {k: os.environ.get(k, "") for k in required}

          missing = [k for k, v in cfg.items() if not v]
          if missing:
              print(f"ERROR: environment variables not set: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          with open("atlas-env.js", "w", encoding="utf-8") as f:
              f.write("// AUTO-GENERATED by GitHub Actions — do not edit by hand.\n")
              f.write("window.__ATLAS_ENV__ = ")
              json.dump(cfg, f, indent=2)
              f.write(";\n")

          print("atlas-env.js generated from repository secrets")
          for k in required:
              print(f"  {k} = (set, {len(cfg[k])} chars)")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
